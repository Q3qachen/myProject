services:
  # mysql 容器
  mysql:
    container_name: crmeb_mysql
    image: ccr.ccs.tencentyun.com/crmebmysql/mysql57:latest
    platform: linux/amd64  # 兼容 arm64 架构
    ports:
      - "33061:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_USER: crmeb
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: crmeb
    volumes:
      # - ./mysql/my.cnf:/etc/mysql/my.cnf
      - ./mysql/data:/var/lib/mysql #挂载数据目录到本地
      - ./mysql/log:/var/log/mysql
    networks:
      app_net:
        ipv4_address: 192.168.10.11
  # redis 容器
  redis:
    container_name: crmeb_redis
    image: ccr.ccs.tencentyun.com/crmebredis/redis:latest
    ports:
      - "63791:6379"
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: 123456
    networks:
      app_net:
        ipv4_address: 192.168.10.10
  # php 容器
  phpfpm:
    container_name: crmeb_php
    image: ccr.ccs.tencentyun.com/crmebphp/crmebky:latest
    restart: always
    environment:
      TZ: Asia/Shanghai
      # 数据库配置环境变量
      MYSQL_HOST_IP: crmeb_mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: crmeb
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: crmeb
      # Redis配置环境变量
      REDIS_HOST_IP: crmeb_redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "0"
      REDIS_PASSWORD: 123456
      # 应用配置环境变量
      APP_DEBUG: true
      DEFAULT_TIMEZONE: Asia/Shanghai
    working_dir: /var/www
    volumes:
      - ../crmeb:/var/www #程序运行目录
      - ../crmeb/runtime:/var/www/runtime #程序运行时目录
    networks:
      app_net:
        ipv4_address: 192.168.10.90
  # nginx 容器
  nginx:
    container_name: crmeb_nginx
    image: ccr.ccs.tencentyun.com/crmebnginx/nginx:latest
    restart: always
    ports:
      - "8011:80"
    # 依赖关系 先跑php
    depends_on:
      - phpfpm
    environment:
      TZ: Asia/Shanghai
    working_dir: /var/www
    volumes_from:
      - phpfpm #继承phpfpm挂载目录
    volumes:
      - ./vhost.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/log:/etc/nginx/log
    networks:
      app_net:
        ipv4_address: 192.168.10.80
networks: #网络配置
  app_net: #网络名称
    driver: bridge
    ipam: #网络配置
      driver: default
      config:
        - subnet: 192.168.10.0/24 #IP区间