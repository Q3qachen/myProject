<style>

    .question{
        position:relative;
        padding:10px 0;
    }

    .scan-wrapper{
        position:relative;
    }

    #ordersn{
        width:100%;
        padding:12px 60px 12px 15px;
        border:1px solid #4E73DF;
        border-radius:50px;
        font-size:15px;
        outline:none;
    }

    #ordersn:focus{
        background:linear-gradient(135deg,#66B3FF,#0066CC);
        color:#fff;
    }

    .scan-btn{
        position:absolute;
        right:15px;
        top:50%;
        transform:translateY(-50%);
        font-size:22px;
        color:#4E73DF;
        cursor:pointer;
        z-index:999;
        display:none !important;   /* 强制隐藏 */
    }

    .show-scan{
        display:block !important;
    }

    .modal{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.7);
        z-index:9999;
    }

    .modal-box{
        width:90%;
        max-width:500px;
        height:420px;
        margin:80px auto;
        background:#fff;
        border-radius:10px;
        padding:10px;
    }

    #reader{
        width:100%;
        height:100%;
        overflow:hidden;
        position:relative;
    }

    #reader video{
        width:100% !important;
        height:100% !important;
        object-fit:cover;
    }

    #reader canvas{
        max-width:100%;
    }

</style>


<div class="panel panel-default panel-intro">

    {:build_heading()}

    <div class="panel-heading"
         style="background-image:linear-gradient(135deg,#66B3FF 10%,#0066CC 100%)">
        <div class="panel-lead"><em>商品入库</em></div>
    </div>


    <div class="panel-body">

        <form id="myInput" class="form-horizontal">

            <div class="form-group">

                <label class="control-label col-xs-12 col-sm-2"></label>

                <div class="col-xs-12 col-sm-8 question">

                    <div class="scan-wrapper">

                        <input id="ordersn" name="ordersn" placeholder="输入接货运单号">

                        <i id="scanBtn" class="fa fa-camera scan-btn"></i>

                    </div>

                </div>

            </div>

        </form>


        <label class="control-label col-xs-12 col-sm-2"></label>

        <div class="col-xs-12 col-sm-8">

            <div class="col-xs-11 liebiao">

                <div id="toolbar" class="toolbar hidden">
                    <a class="btn btn-primary btn-refresh">
                        <i class="fa fa-refresh"></i>
                    </a>
                </div>

                <table id="table"
                       class="table table-striped table-bordered table-hover"
                       width="100%">
                </table>

            </div>

        </div>

    </div>

</div>


<!-- 扫码窗口 -->
<div id="scanModal" class="modal">
    <div class="modal-box">
        <div id="reader" style="width:100%;height:100%"></div>
    </div>
</div>



<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="/assets/libs/fastadmin-layer/src/layer.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>


<script>

    $(function(){

        $("#ordersn").focus();

        if(isMobile()){
            $("#scanBtn").addClass("show-scan");
        }

    });

    /* 判断是否手机 */
    function isMobile(){
        return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    }

    $(function(){

        $("#ordersn").focus();

        /* 手机显示扫码按钮 */
        if(isMobile()){
            $("#scanBtn").show();
        }

        /* 回车提交 */
        $("#ordersn").keydown(function(e){

            if(e.which==13){

                e.preventDefault();

                let val=$("#ordersn").val();

                $.ajax({

                    url:"scode/index",
                    type:"POST",
                    data:{ordersn:val},
                    dataType:"json",

                    success:function(res){

                        layer.msg(res.msg);

                        setTimeout(function(){

                            // window.parent.location.reload();
                            $("#table").bootstrapTable("refresh");

                        },2000);

                    }

                });

            }

        });

    });


    let scanner;

    $("#scanBtn").on("click", function(e){

        e.preventDefault();
        e.stopPropagation();

        $("#scanModal").show();

        scanner = new Html5Qrcode("reader");

        /* ⭐ 直接强制使用后置摄像头 */
        scanner.start(
            { facingMode: "environment" },   // 关键
            {
                fps: 10,
                qrbox: { width: 250, height: 250 }
            },
            function(decodedText){

                $("#ordersn").val(decodedText);

                scanner.stop().then(()=>{
                    $("#scanModal").hide();
                });

                layer.msg("扫码成功");

            }
        ).catch(function(err){

            console.log(err);
            layer.msg("摄像头启动失败");

        });

    });

    $("#scanModal").on("click", function(e){

        // 如果点击的是遮罩（不是扫码框）
        if(e.target.id === "scanModal"){

            closeScan();

        }

    });

    function closeScan(){

        if(scanner){
            scanner.stop().then(()=>{
                $("#scanModal").hide();
            }).catch(()=>{
                $("#scanModal").hide();
            });
        }else{
            $("#scanModal").hide();
        }

    }


</script>
