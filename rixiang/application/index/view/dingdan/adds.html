
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运单号管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: modalFadeIn 0.3s;
        }
        
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .input-group {
            display: flex;
            margin-bottom: 20px;
        }
        
        .input-field {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
            font-size: 16px;
            outline: none;
        }
        
        .add-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .add-btn:hover {
            background-color: #45a049;
        }
        
        .tracking-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        
        .tracking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
        }
        
        .tracking-item:last-child {
            border-bottom: none;
        }
        
        .tracking-item:hover {
            background-color: #f9f9f9;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: #ff5252;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            color: #ff0000;
            transform: scale(1.2);
        }
        
        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .save-btn {
            background-color: #2196F3;
        }
        
        .save-btn:hover {
            background-color: #0b7dda;
        }
        
        .cancel-btn {
            background-color: #f44336;
        }
        
        .cancel-btn:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="openModalBtn" class="btn">添加运单号</button>
    </div>

    <div id="trackingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">运单号管理</h2>
                <button class="close-btn">&times;</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="trackingInput" class="input-field" placeholder="请输入运单号">
                <button id="addTrackingBtn" class="add-btn"><i class="fas fa-plus"></i></button>
            </div>
            
            <ul id="trackingList" class="tracking-list">
                <!-- 运单号列表将在这里动态生成 -->
            </ul>
            
            <div class="actions">
                <button id="cancelBtn" class="btn cancel-btn">取消</button>
                <button id="saveBtn" class="btn save-btn">保存</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const openModalBtn = document.getElementById('openModalBtn');
            const trackingModal = document.getElementById('trackingModal');
            const closeBtn = document.querySelector('.close-btn');
            const cancelBtn = document.getElementById('cancelBtn');
            const addTrackingBtn = document.getElementById('addTrackingBtn');
            const trackingInput = document.getElementById('trackingInput');
            const trackingList = document.getElementById('trackingList');
            const saveBtn = document.getElementById('saveBtn');
            
            // 从localStorage加载保存的运单号
            let trackingNumbers = JSON.parse(localStorage.getItem('trackingNumbers')) || [];
            
            // 渲染运单号列表
            function renderTrackingList() {
                trackingList.innerHTML = '';
                trackingNumbers.forEach((number, index) => {
                    const li = document.createElement('li');
                    li.className = 'tracking-item';
                    li.innerHTML = `
                        <span>${number}</span>
                        <button class="delete-btn" data-index="${index}">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    trackingList.appendChild(li);
                });
                
                // 添加删除事件监听
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.getAttribute('data-index'));
                        trackingNumbers.splice(index, 1);
                        renderTrackingList();
                    });
                });
            }
            
            // 打开模态框
            openModalBtn.addEventListener('click', function() {
                trackingModal.style.display = 'flex';
                renderTrackingList();
            });
            
            // 关闭模态框
            function closeModal() {
                trackingModal.style.display = 'none';
                trackingInput.value = '';
            }
            
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            
            // 点击模态框外部关闭
            trackingModal.addEventListener('click', function(e) {
                if (e.target === trackingModal) {
                    closeModal();
                }
            });
            
            // 添加运单号
            addTrackingBtn.addEventListener('click', function() {
                const number = trackingInput.value.trim();
                if (number) {
                    trackingNumbers.push(number);
                    trackingInput.value = '';
                    renderTrackingList();
                }
            });
            
            // 回车添加运单号
            trackingInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addTrackingBtn.click();
                }
            });
            
            // 保存运单号
            saveBtn.addEventListener('click', function() {
                localStorage.setItem('trackingNumbers', JSON.stringify(trackingNumbers));
                alert('运单号已保存！');
                closeModal();
            });
            
            // 初始化渲染
            renderTrackingList();
        });
    </script>
</body>
</html>
